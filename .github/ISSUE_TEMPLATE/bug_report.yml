name: バグレポート
description: MOD の不具合を報告する
title: "[BUG] "
labels: ["bug"]
assignees:
  - kuramochia

body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **注意：** game.log.txt が添付されていない場合、確認せずにクローズします。

  - type: input
    id: mod_name
    attributes:
      label: MOD名
      description: 不具合が発生しているMOD名を入力してください
      placeholder: 例：Scania Custom Chrome Parts
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: MODバージョン
      description: MODのバージョンを入力してください
      placeholder: 例：1.0
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: バグの説明
      description: バグの内容を説明してください
      placeholder: バグの内容...
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: 再現手順
      description: バグを再現する手順を番号付きリストで説明してください
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期待される動作
      description: 正常な場合はどのように動作するはずだったのかを説明してください
      placeholder: 期待される動作...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: 実際の動作
      description: 実際に起こった動作を説明してください
      placeholder: 実際の動作...
    validations:
      required: true

  - type: dropdown
    id: game_version
    attributes:
      label: ゲームバージョン
      description: バグが発生しているゲームとバージョンを選択してください
      options:
        - Euro Truck Simulator 2
        - American Truck Simulator
    validations:
      required: true

  - type: input
    id: game_version_number
    attributes:
      label: ゲームバージョン
      description: ゲームのバージョン番号を入力してください
      placeholder: 例：1.50.0.1s
    validations:
      required: true

  - type: checkboxes
    id: game_log_attached
    attributes:
      label: game.log.txt 添付確認
      description: "⚠️ **必須** - game.log.txt をこのIssueに添付してください"
      options:
        - label: game.log.txt を添付しました
          required: true

  - type: textarea
    id: game_log_content
    attributes:
      label: game.log.txt の内容
      description: game.log.txt ファイルをドラッグ&ドロップするか、クリックして選択してください
      placeholder: ここにログファイルを貼り付けるか添付してください

  - type: textarea
    id: screenshot_video
    attributes:
      label: スクリーンショット/動画
      description: 不具合の様子を示すスクリーンショットや動画があれば説明してください（オプション）
      placeholder: スクリーンショット/動画の説明...

  - type: textarea
    id: additional_info
    attributes:
      label: 追加情報
      description: その他の関連情報があれば記載してください（オプション）
      placeholder: 追加情報...
